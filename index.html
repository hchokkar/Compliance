<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MFX Governace Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <div class="login-shell">
      <div class="login-panel">
        <div class="login-brand">
          <div class="brand-mark">CS</div>
          <div>
            <h1>Cybersecurity Access</h1>
            <p>Redefine security with smart infrastructure access and proactive risk control.</p>
          </div>
        </div>
        <div class="infra-graphic" aria-hidden="true">
          <span class="line line-1"></span>
          <span class="line line-2"></span>
          <span class="line line-3"></span>
          <span class="node core"></span>
          <span class="node node-a"></span>
          <span class="node node-b"></span>
          <span class="node node-c"></span>
        </div>

        <div class="login-alert">
          <span class="alert-dot"></span>
          <p>Defense mode active. Authenticate securely to view the vulnerability dashboard.</p>
        </div>

        <form id="loginForm" class="login-form">
          <label for="email">User ID</label>
          <input id="email" name="email" type="email" placeholder="Enter Your User ID" autocomplete="username" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••••" autocomplete="current-password" required />

          <div class="login-meta">
            <label class="remember-me">
              <input type="checkbox" id="remember" />
              Remember me
            </label>
            <a href="#" class="help-link">Need help?</a>
          </div>

          <button type="submit" class="primary-btn">Secure Sign In</button>
          <div id="validationMessage" class="message"></div>
        </form>

        <div class="security-footnote">
          <p>Defense-grade authentication with infrastructure-aware control and accelerated visibility.</p>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
